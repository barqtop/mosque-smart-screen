<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري تحميل ملف المواقيت...</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding-top: 100px; background: #f8fafc; color: #334155; }
        .loader { border: 4px solid #cbd5e1; border-top: 4px solid #059669; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>جاري تحميل ملف مواقيت سوريا للمسجد...</h2>
    <p>إذا لم يبدأ التحميل تلقائياً خلال ثوانٍ، <a id="fallback" href="#">اضغط هنا</a>.</p>

    <script>
        // هنا نضع كود الأوقات الفعلي الخاص بدولتك الذي ولدته سابقاً
        const dataToDownload = `const currentCountryData = {
    "country_code": "Syria",
    "country_name": "الجمهورية العربية السورية",
    "cities": {
        "Damascus": {
            "name": "دمشق",
            "prayers": {
                "01-01": { "fajr": "06:03", "shorooq": "07:39", "dhuhr": "12:38", "asr": "15:19", "maghrib": "17:37", "isha": "19:04" }
            }
        }
    }
};`;

        // وظيفة التحميل التلقائي الإجباري
        function triggerDownload() {
            const blob = new Blob([dataToDownload], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Syria-prayers.js'; // سينزل بجهاز المؤذن بهذا الاسم والامتداد الأصلي الصحيح!
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            document.getElementById('fallback').href = url;
            document.getElementById('fallback').download = 'Syria-prayers.js';
        }

        // تشغيل التحميل فور فتح الصفحة
        window.onload = triggerDownload;
    </script>
</body>
</html>
